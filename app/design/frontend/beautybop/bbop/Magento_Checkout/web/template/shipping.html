<li id="shipping"
    class="checkout-shipping-address"
    data-bind="fadeVisible: visible()">

    <!--<div class="step-title"
         translate="'Shipping Address'"
         data-role="title"></div> -->

    <div id="checkout-step-shipping"
         class="step-content"
         data-role="content">

        
        <!-- Contact Information -->

        <div class="bb-checkout-section">

            <div class="bb-card bb-card--contact">

                <div class="bb-card__header">

                    <h2 class="bb-card__title">
                        <span data-bind="i18n: 'Contact Information'"></span>
                    </h2>

                    <p class="bb-card__description">

                        We'll send your order confirmation and delivery updates to this email address.

                    </p>

                </div>

                <div class="bb-card__body">

                    <each if="!quoteIsVirtual"
                        args="getCustomerEmailRegion()"
                        render="">
                    </each>

                </div>

            </div>

        </div>

        <!-- Saved Addresses -->
        <each args="getAddressListRegion()"
              render=""></each>

        <!-- Additional Saved Addresses -->
        <each args="getRegion('address-list-additional-addresses')"
              render=""></each>

        <!-- Address form popup -->
        <if args="!isFormInline">

            <div class="new-address-popup">

                <button type="button"
                        class="action action-show-popup"
                        click="showFormPopUp"
                        visible="!isNewAddressAdded()">

                    <span translate="'New Address'"></span>

                </button>

            </div>

            <div id="opc-new-shipping-address"
                 visible="isFormPopUpVisible()"
                 render="shippingFormTemplate"></div>

        </if>

        <!-- Components before address form -->
        <div class="bb-checkout-section">

            <div class="bb-card bb-card--address">

                <div class="bb-card__header">

                    <h2 class="bb-card__title">
                        <span data-bind="i18n: 'Delivery Address'"></span>
                    </h2>

                    <p class="bb-card__subtitle">
                        <span data-bind="i18n: 'Where should we deliver your order?'"></span>
                    </p>

                </div>

                <div class="bb-card__body">

                    
                    <each args="getBeforeFormRegion()" render=""></each>
                    

                    <render if="isFormInline"
                            args="getShippingFormTemplate()">
                    </render>

                </div>

            </div>

        </div>
    </div>

</li>

<!-- Shipping Method -->
<li id="opc-shipping_method"
    class="checkout-shipping-method"
    data-bind="fadeVisible: visible(), blockLoader: isLoading"
    role="presentation">

    <div class="checkout-shipping-method">

        <div class="step-title"
             translate="'Shipping Methods'"
             data-role="title"></div>

        <each args="getRegion('before-shipping-method-form')"
              render=""></each>

        <div id="checkout-step-shipping_method"
             class="step-content"
             data-role="content"
             role="tabpanel"
             aria-hidden="false">

            <form id="co-shipping-method-form"
                  class="form methods-shipping"
                  if="rates().length"
                  submit="setShippingInformation"
                  novalidate="novalidate">

                <render args="shippingMethodListTemplate"></render>

                <div id="onepage-checkout-shipping-method-additional-load">

                    <each args="getShippingAdditionalRegion()"
                          render=""></each>

                </div>

                <div role="alert"
                     if="errorValidationMessage().length"
                     class="message notice">

                    <span text="errorValidationMessage()"></span>

                </div>

                <div class="actions-toolbar"
                     id="shipping-method-buttons-container">

                    <div class="primary">

                        <button data-role="opc-continue"
                                type="submit"
                                class="button action continue primary">

                            <span translate="'Next'"></span>

                        </button>

                    </div>

                </div>

            </form>

            <div class="no-quotes-block"
                 ifnot="rates().length > 0"
                 translate="'Sorry, no quotes are available for this order at this time'">
            </div>

        </div>

    </div>

</li>
